<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - FlootVps</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrap animate-fade-up">
        <div class="card auth-card">
            <h2 class="text-center" style="font-family: var(--font-heading); margin-bottom: 20px;">Chào mừng trở lại</h2>
            
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" class="form-control" placeholder="Nhập tên đăng nhập">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" class="form-control" placeholder="Nhập mật khẩu">
            </div>
            
            <button class="btn hover-scale" style="width: 100%; margin-top: 10px;" onclick="window.location.href='index.html'">Đăng Nhập</button>
            
            <p class="text-center mt-2" style="font-size: 0.9rem;">
                Chưa có tài khoản? <a href="register.html" class="text-accent" style="font-weight: bold;">Đăng ký ngay</a>
            </p>
        </div>
    </div>
    <script>
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
