<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký - FlootVps</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/animations.css">
</head>
<body>
    <div class="auth-wrap animate-fade-up">
        <div class="card auth-card">
            <h2 class="text-center" style="font-family: var(--font-heading); margin-bottom: 10px;">Tạo tài khoản mới</h2>
            <p class="text-center" style="opacity: 0.7; margin-bottom: 30px;">Gia nhập cộng đồng FlootVps ngay</p>
            
            <form onsubmit="event.preventDefault(); window.location.href='login.html'; alert('Đăng ký thành công!');">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" class="form-control" placeholder="Ví dụ: floot_user" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Nhập lại mật khẩu</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn hover-scale" style="width: 100%; margin-top: 10px;">Đăng Ký Ngay</button>
            </form>

            <p class="text-center mt-2" style="font-size: 0.9rem;">
                Đã có tài khoản? <a href="login.html" class="text-accent">Đăng nhập</a>
            </p>
        </div>
    </div>
    
    <script>
        // Check theme để tránh bị loá mắt khi mới vào
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>
</html>
